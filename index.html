<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>EJJ 홈페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <header class="header" role="banner">
      <div class="header__inner">
        <div class="header__brand" aria-label="브랜드·CI 영역">
          <!-- 로고 교체: public/images/ 아래 SVG로 두고 src 경로만 맞추면 됩니다. -->
          <img
            class="header__logo"
            src="public/images/logo-sample.svg"
            width="32"
            height="32"
            alt=""
            decoding="async"
          />
          <span class="header__wordmark">EJJ</span>
        </div>

        <nav class="header__nav" aria-label="주 메뉴 (준비 중)">
          <ul class="header__nav-list">
            <li>
              <button type="button" class="header__nav-item is-skeleton" aria-disabled="true">조직 소개</button>
            </li>
            <li>
              <button type="button" class="header__nav-item is-skeleton" aria-disabled="true">조직 사업</button>
            </li>
            <li>
              <button type="button" class="header__nav-item is-skeleton" aria-disabled="true">조직 활동</button>
            </li>
            <li>
              <button type="button" class="header__nav-item is-skeleton" aria-disabled="true">나의 기부</button>
            </li>
            <li>
              <button type="button" class="header__nav-item is-skeleton" aria-disabled="true">커뮤니티</button>
            </li>
          </ul>
        </nav>

        <div class="header__tools">
          <button
            type="button"
            class="header__action header__action--login"
            id="login-open-btn"
            data-login-open
            aria-haspopup="dialog"
            aria-controls="login-dialog"
            aria-expanded="false"
            aria-label="로그인 창 열기"
          >
            <svg
              class="header__glyph"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
            <span class="header__action-text">로그인</span>
          </button>
          <button
            type="button"
            class="header__lang-pill is-skeleton"
            aria-label="영문 사이트 (준비 중)"
            aria-disabled="true"
          >
            <span class="header__lang-pill-text">ENG</span>
          </button>
        </div>
      </div>
    </header>

    <section class="hero" aria-label="메인 배너 슬라이드 영역 (준비 중)">
      <div class="hero__viewport">
        <div class="hero__slide">
          <div class="hero__layout">
            <div class="hero__visual" aria-hidden="true">
              <div class="hero__visual-frame"></div>
            </div>
            <div class="hero__copy">
              <h2 class="hero__title" id="hero-title" aria-live="polite">배너 헤드라인 1</h2>
              <p class="hero__desc">
                슬라이드 배너에 들어갈 부제·요약 문구가 이 위치에 배치됩니다. 현재는 레이아웃용 스켈레톤입니다.
              </p>
            </div>
          </div>
        </div>

        <button
          type="button"
          class="hero__ctrl hero__ctrl--prev"
          aria-label="이전 슬라이드"
        >
          <svg class="hero__chevron" width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <button
          type="button"
          class="hero__ctrl hero__ctrl--next"
          aria-label="다음 슬라이드"
        >
          <svg class="hero__chevron" width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </section>

    <main class="main" role="main">
      <div class="main__surface">
        <p class="main__lead">본문 영역</p>
        <p class="main__note">하단 콘텐츠는 이후 단계에서 구성됩니다.</p>
      </div>
    </main>

    <div
      class="login-modal"
      id="login-modal"
      hidden
      aria-hidden="true"
    >
      <div class="login-modal__backdrop" data-modal-close tabindex="-1"></div>
      <div
        class="login-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="login-modal-title"
        id="login-dialog"
      >
        <button
          type="button"
          class="login-modal__close"
          data-modal-close
          aria-label="로그인 창 닫기"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" />
          </svg>
        </button>
        <h2 class="login-modal__title" id="login-modal-title">로그인</h2>
        <p class="login-modal__hint">테스트 계정: 아이디 <strong>admin</strong>, 비밀번호 <strong>admin</strong></p>
        <p class="login-modal__error" id="login-modal-error" role="alert" hidden></p>
        <form class="login-modal__form" id="login-modal-form" action="#" novalidate>
          <div class="login-modal__field">
            <label class="login-modal__label" for="login-modal-email">아이디</label>
            <input
              class="login-modal__input"
              id="login-modal-email"
              name="id"
              type="text"
              autocomplete="username"
              placeholder="admin"
            />
          </div>
          <div class="login-modal__field">
            <label class="login-modal__label" for="login-modal-password">비밀번호</label>
            <input
              class="login-modal__input"
              id="login-modal-password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="admin"
            />
          </div>
          <button type="submit" class="login-modal__submit" disabled aria-disabled="true">
            로그인
          </button>
        </form>
      </div>
    </div>

    <footer class="footer" role="contentinfo">
      <div class="footer__inner">
        <p class="footer__line">
          <span class="footer__label">사무실</span> <span class="footer__value">서울특별시</span>
        </p>
        <p class="footer__line">
          <span class="footer__label">대표자</span> <span class="footer__value">조은혜</span>
          <span class="footer__sep">|</span>
          <span class="footer__label">대표 전화</span> <span class="footer__value">010-0000-0000</span>
        </p>
        <p class="footer__copyright">ⓒ EJJ. ALL RIGHTS RESERVED.</p>
      </div>
    </footer>

    <script src="src/scripts/login-modal.js" defer></script>
    <script src="src/scripts/hero-banner.js" defer></script>
  </body>
</html>
